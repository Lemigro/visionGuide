name: visionguide_mobile
description: VisionGuide mobile prototype in Flutter.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  image_picker: ^1.2.2
  provider: ^6.1.5+1
  go_router: ^17.2.3
  http: ^1.2.0
  web_socket_channel: ^3.0.1
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
